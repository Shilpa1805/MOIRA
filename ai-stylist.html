<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOIRÀ - AI Stylist</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="page-stylist">
    <div class="background-container">
        <img class="bg-img" src="https://images.unsplash.com/photo-1549480017-d77415e4787a?auto=format&fit=crop&q=80&w=2000" alt="background">
        <div class="bg-overlay"></div>
    </div>

    <main class="app-container">
        <header class="app-header">
            <div class="logo-box">
                <h1><i>M</i>oira</h1>
                <span class="subtitle">Smart Recommendations</span>
            </div>
        </header>

        <div class="views-container">
            <div class="view active">
                <div class="section-title" style="margin-top:10px;">
                    Closet-First Stylist
                </div>
                <div class="scroll-wrapper">
                    <div class="stylist-box glass-card">
                        <p style="margin-bottom: 20px;">What vibe are you going for today?</p>
                        <div class="vibe-tags">
                            <span class="pill outline active-vibe">Sunday Brunch</span>
                            <span class="pill outline">University Lecture</span>
                            <span class="pill outline">Date Night</span>
                        </div>
                        <button class="btn btn-primary btn-block" style="margin-top:30px;" onclick="app.generateOutfit(event)">Generate Outfit</button>
                    </div>
                    
                    <div id="outfit-result" style="display:none; margin-top:20px;">
                        <p class="subtitle" style="margin-bottom:10px">Prioritized Collection:</p>
                        <div class="clothing-grid" id="outfit-grid"></div>
                    </div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="my-closet.html" class="nav-item">
                <i class='bx bx-closet'></i>
                <span>My Closet</span>
            </a>
            <a href="index.html" class="nav-item">
                <i class='bx bx-group'></i>
                <span>Circles</span>
            </a>
            <a href="ai-stylist.html" class="nav-item active">
                <i class='bx bx-magic-wand'></i>
                <span>AI Stylist</span>
            </a>
        </nav>
    </main>
    
    <!-- Modal Overlay for Try On -->
    <div id="modal-overlay" class="modal-overlay" onclick="app.closeModalOnOutsideClick(event)">
        <div id="modal-try-on" class="modal-card">
            <button class="close-btn" onclick="app.closeModal()"><i class='bx bx-x'></i></button>
            <h3 style="margin-bottom:10px;">Virtual Try-On</h3>
            <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 20px;">2D-to-3D Metric Mapping engaged.</p>
            <div class="try-on-scene" id="try-on-scene"></div>
            <button class="btn btn-primary btn-block" style="margin-top:20px;" onclick="app.closeModal()">Finished</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
