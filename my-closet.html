<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOIRÀ - My Closet</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="page-closet">
    <div class="background-container">
        <img class="bg-img" src="https://images.unsplash.com/photo-1549480017-d77415e4787a?auto=format&fit=crop&q=80&w=2000" alt="background">
        <div class="bg-overlay"></div>
    </div>

    <main class="app-container">
        <header class="app-header">
            <div class="logo-box">
                <h1><i>M</i>oira</h1>
                <span class="subtitle">My Digital Twin</span>
            </div>
            <div class="user-profile-mini">
                <img src="https://i.pravatar.cc/150?u=me" style="width:40px; height:40px; border-radius:50%; border:2px solid var(--snow);">
            </div>
        </header>

        <div class="views-container">
            <div class="view active">
                <div class="section-title" style="margin-top:10px;">
                    My Digital Wardrobe
                </div>
                <div class="scroll-wrapper">
                    <div class="clothing-grid" id="my-wardrobe-grid">
                        <!-- My items injected here -->
                    </div>
                </div>
                <div class="bottom-actions-float" style="justify-content: flex-end">
                     <div class="upload-btn-container" onclick="app.openUploadModal()">
                        <button class="btn-upload" style="background:var(--opera-mauve); border-color:var(--opera-mauve);"><i class='bx bx-plus'></i></button>
                        <span class="upload-text">ADD ITEM</span>
                    </div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="my-closet.html" class="nav-item active">
                <i class='bx bx-closet'></i>
                <span>My Closet</span>
            </a>
            <a href="index.html" class="nav-item">
                <i class='bx bx-group'></i>
                <span>Circles</span>
            </a>
            <a href="ai-stylist.html" class="nav-item">
                <i class='bx bx-magic-wand'></i>
                <span>AI Stylist</span>
            </a>
        </nav>
    </main>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay" onclick="app.closeModalOnOutsideClick(event)">
        <div id="modal-upload" class="modal-card">
            <button class="close-btn" onclick="app.closeModal()"><i class='bx bx-x'></i></button>
            <h3 style="margin-bottom:20px;">Digitize Garment</h3>
            <div class="upload-dropzone">
                <i class='bx bx-image-add' style="font-size: 3rem; color: var(--opera-mauve)"></i>
                <p style="margin-top:10px; font-size: 0.8rem">Take a flat-lay photo or upload</p>
            </div>
            <button class="btn btn-primary btn-block" style="margin-top:20px;" onclick="app.closeModal()">Process to 3D</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
